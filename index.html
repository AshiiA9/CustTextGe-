<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Text Generator</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef7ff;
  color:#111827;
}
.header{
  background:linear-gradient(90deg,#0ea5e9,#ec4aa5);
  color:white;
  padding:24px 16px;
  text-align:center;
}
.header h1{margin:0;font-size:24px}
.header p{margin:8px 0 0}
.wrap{max-width:750px;margin:auto;padding:16px}
.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
h2{margin-top:0;font-size:18px}
.btn-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
button{
  border:0;
  border-radius:14px;
  padding:14px;
  font-size:16px;
  font-weight:700;
  background:#e0f2fe;
  color:#075985;
}
button.selected{
  background:linear-gradient(90deg,#0ea5e9,#ec4aa5);
  color:white;
}
.output{
  background:#f8fafc;
  border:1px solid #dbeafe;
  border-radius:14px;
  padding:14px;
  min-height:90px;
  font-size:16px;
  line-height:1.45;
}
.copy{
  width:100%;
  margin-top:10px;
  background:#ec4aa5;
  color:white;
}
.clear{
  width:100%;
  margin-top:10px;
  background:#64748b;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <h1>Customer Text Generator</h1>
  <p>Shield Pest Appalachia</p>
</div>

<div class="wrap">

  <div class="card">
    <h2>Greeting</h2>
    <div class="btn-grid">
      <button onclick="selectOption('greeting','Good morning',this)">Good Morning</button>
      <button onclick="selectOption('greeting','Good afternoon',this)">Good Afternoon</button>
    </div>
  </div>

  <div class="card">
    <h2>Status</h2>
    <div class="btn-grid">
      <button onclick="selectOption('status','behind',this)">Running Behind</button>
      <button onclick="selectOption('status','ahead',this)">Running Ahead</button>
      <button onclick="selectOption('status','ontime',this)">On Time</button>
    </div>
  </div>

  <div class="card">
    <h2>ETA</h2>
    <div class="btn-grid">
      <button onclick="selectOption('eta','5-10 minutes away',this)">5-10 Minutes Away</button>
      <button onclick="selectOption('eta','15 minutes away',this)">15 Minutes Away</button>
      <button onclick="selectOption('eta','30 minutes away',this)">30 Minutes Away</button>
      <button onclick="selectOption('eta','45 minutes away',this)">45 Minutes Away</button>
      <button onclick="selectOption('eta','1 hour away',this)">1 Hour Away</button>
    </div>
  </div>

  <div class="card">
    <h2>Generated Text</h2>
    <div id="output" class="output">
      Select a greeting, status, and ETA to generate the text.
    </div>
    <button class="copy" onclick="copyText()">Copy Text</button>
    <button class="clear" onclick="clearAll()">Clear</button>
  </div>

</div>

<script>
let selections = {
  greeting:"",
  status:"",
  eta:""
};

function selectOption(type,value,btn){
  selections[type]=value;

  const buttons = btn.parentElement.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");

  generateText();
}

function generateText(){
  const output=document.getElementById("output");

  if(!selections.greeting || !selections.status || !selections.eta){
    output.textContent="Select a greeting, status, and ETA to generate the text.";
    return;
  }

  let text="";

  if(selections.status==="behind"){
    text=`${selections.greeting}, this is Ashton from Shield Pest Appalachia. I apologize, I am running a little behind schedule, but I can head your way shortly and should be about ${selections.eta}.`;
  }

  if(selections.status==="ahead"){
    text=`${selections.greeting}, this is Ashton from Shield Pest Appalachia. I am running a little ahead of schedule and can head your way. I should be about ${selections.eta}.`;
  }

  if(selections.status==="ontime"){
    text=`${selections.greeting}, this is Ashton from Shield Pest Appalachia. I am on schedule and can head your way. I should be about ${selections.eta}.`;
  }

  output.textContent=text;
}

function copyText(){
  const text=document.getElementById("output").textContent;
  navigator.clipboard.writeText(text);
}

function clearAll(){
  selections={greeting:"",status:"",eta:""};
  document.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
  document.getElementById("output").textContent="Select a greeting, status, and ETA to generate the text.";
}
</script>

</body>
</html>
